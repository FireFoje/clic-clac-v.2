<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Фото дивана Рокки | Clic-Clac</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="photos-page">
  <main class="photos-main">
    <div class="container">
      <div class="photos-header">
        <div>
          <h1 class="tittle">Фотографии Рокки</h1>
          <p class="sub-tittle">Все фото, которые мы добавили в галерею.</p>
        </div>
        <a class="btn btn-ghost" href="/">На главную</a>
      </div>

      <div id="photosGrid" class="photos-grid" aria-live="polite"></div>
      <p id="photosEmpty" class="photos-empty" hidden>Пока нет загруженных фото.</p>
    </div>
  </main>

  <div id="photosLightbox" class="photos-lightbox" aria-hidden="true">
    <div class="photos-lightbox__backdrop" data-lightbox-close></div>
    <div class="photos-lightbox__content" role="dialog" aria-modal="true" aria-label="Фотография">
      <button class="photos-lightbox__close" type="button" data-lightbox-close aria-label="Закрыть">×</button>
      <button class="photos-lightbox__nav photos-lightbox__prev" type="button" data-lightbox-prev aria-label="Предыдущее фото">‹</button>
      <img id="photosLightboxImage" class="photos-lightbox__image" src="" alt="Фото дивана Рокки" />
      <button class="photos-lightbox__nav photos-lightbox__next" type="button" data-lightbox-next aria-label="Следующее фото">›</button>
      <div id="photosLightboxCounter" class="photos-lightbox__counter"></div>
    </div>
  </div>

  <script src="./photos.js"></script>
</body>
</html>
